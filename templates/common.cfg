input:
{
	strings:
	[
		{ id: "VENDOR-NAME"; name: "Vendor Name"; },
		{ id: "PRODUCT-NAME"; name: "Product Name"; }
	];
};

generate:
{
	paths:
	[
		{ id: "REFLEX-PATH"; op: 'Relative'; param: "../.."; }
	];

	strings:
	[
		{ id: "VENDOR-NAME-SYMBOL-LOWER"; op: 'StripLowercase'; param: "VENDOR-NAME"; },

		{ id: "VENDOR-4CC"; op: 'Generate4CC'; param: "VENDOR-NAME"; },

		{ id: "PRODUCT-NAME-SYMBOL"; op: 'Strip'; param: "PRODUCT-NAME"; },

		{ id: "PRODUCT-NAME-SYMBOL-LOWER"; op: 'StripLowercase'; param: "PRODUCT-NAME"; },

		{ id: "PRODUCT-4CC"; op: 'Generate4CC'; param: "PRODUCT-NAME"; },

		{ id: "VC-PATHS"; op: 'Constant'; param: "Paths"; },
		{ id: "XCODE-PATHS"; op: 'Constant'; param: "paths"; },
		{ id: "ANDROID-LOCAL"; op: 'Constant'; param: "local"; }
	];
};

exclude:
{
	folders: [".git", "Debug", "Release", ".vs"];
	files: ["install.cfg"];
};

replace:
{
	types: ["cpp", "h", "c", "txt", "glx", "cmake", "xml", "sln", "bat", "command", "vcxproj", "props", "xcscheme", "xcconfig", "pbxproj", "java", "name", "kt", "gradle", "properties", "RENAME"];

	vars:
	[
		"REFLEX-PATH",

		"VENDOR-NAME",
		"PRODUCT-NAME",

		"VENDOR-NAME-SYMBOL-LOWER",
		"VENDOR-4CC",
		"PRODUCT-NAME-SYMBOL",
		"PRODUCT-NAME-SYMBOL-LOWER",
		"PRODUCT-4CC"
	];
};

rename:
{
	types: ["sln", "vcxproj", "xcodeproj", "props", "xcconfig", "properties"];

	vars:
	[
		//macos & windows projects
		"PRODUCT-NAME",

		//android projects
		"VENDOR-NAME-SYMBOL-LOWER",

		"PRODUCT-NAME-SYMBOL",
		"PRODUCT-NAME-SYMBOL-LOWER",

		//paths configs to avoid being gitignored
		"VC-PATHS",
		"XCODE-PATHS",
		"ANDROID-LOCAL"
	];
};
