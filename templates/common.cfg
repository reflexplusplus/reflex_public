input:
{
	strings:
	[
		{ id: "vendor"; token: "VENDOR-NAME"; name: "Vendor Name"; },
		{ id: "product"; token: "PRODUCT-NAME"; name: "Product Name"; }
	];
};

generate:
{
	paths:
	[
		{ token: "REFLEX-PATH"; op: 'Relative'; param: "../.."; }
	];

	strings:
	[
		{ token: "PRODUCT-NAME-SYMBOL"; op: 'Strip'; param: "PRODUCT-NAME"; },

		{ token: "PACKAGE-ID-VENDOR"; op: 'PackageIdentifier'; param: "VENDOR-NAME"; },
		{ token: "PACKAGE-ID-PRODUCT"; op: 'PackageIdentifier'; param: "PRODUCT-NAME"; },

		{ token: "VENDOR-4CC"; op: 'Generate4CC'; param: "VENDOR-NAME"; },
		{ token: "PRODUCT-4CC"; op: 'Generate4CC'; param: "PRODUCT-NAME"; },

		{ token: "VC-PATHS"; op: 'Constant'; param: "Paths"; },
		{ token: "XCODE-PATHS"; op: 'Constant'; param: "paths"; },
		{ token: "ANDROID-LOCAL"; op: 'Constant'; param: "local"; },

		{ token: "RESOURCES-H"; op: 'Constant'; param: "resources.h"; },
		{ token: "RESOURCES-CPP"; op: 'Constant'; param: "resources.cpp"; }
	];
};

exclude:
{
	folders: [".git", "Debug", "Release", ".vs"];
	files: ["install.cfg", ".DS_Store", "_PRODUCT-NAME_.xcodeproj.zip", "_PRODUCT-NAME_.zip"];
};

replace:
{
	types: ["cpp", "h", "c", "txt", "glx", "cmake", "xml", "sln", "bat", "command", "vcxproj", "props", "xcscheme", "xcconfig", "pbxproj", "java", "name", "kt", "gradle", "properties", "RENAME"];

	vars:
	[
		"REFLEX-PATH",

		"VENDOR-NAME",
		"PRODUCT-NAME",

		"PRODUCT-NAME-SYMBOL",
		"PACKAGE-ID-VENDOR",
		"PACKAGE-ID-PRODUCT",
		"VENDOR-4CC",
		"PRODUCT-4CC"
	];
};

rename:
{
	types_UNUSED: ["sln", "vcxproj", "xcodeproj", "props", "xcconfig", "properties"];

	vars:
	[
		//macos & windows projects
		"PRODUCT-NAME",

		//android projects
		"PRODUCT-NAME-SYMBOL",

		"PACKAGE-ID-VENDOR",
		"PACKAGE-ID-PRODUCT",

		//paths configs to avoid being gitignored
		"VC-PATHS",
		"XCODE-PATHS",
		"ANDROID-LOCAL",

		//resource stubs to allow installed projects to ignore generated files
		"RESOURCES-H",
		"RESOURCES-CPP"
	];
};
